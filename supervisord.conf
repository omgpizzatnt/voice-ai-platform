; supervisor config file for Voice AI Platform
; Using separate virtual environments for each component

[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[supervisord]
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
nodaemon=true
minfds=1024
minprocs=200

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[program:gpt-sovits-1]
command=/workspace/venvs/gpt-sovits/bin/python api_v2.py -a 127.0.0.1 -p 9881 -dr "/workspace/models/custom_voices/default/reference.wav" -dt "参考音频文本" -dl "zh"
directory=/workspace/GPT-SoVITS
autostart=true
autorestart=true
priority=10
startsecs=30
stdout_logfile=/var/log/supervisor/gpt-sovits-1.log
stderr_logfile=/var/log/supervisor/gpt-sovits-1-error.log
environment=PYTHONUNBUFFERED="1",CUDA_VISIBLE_DEVICES="0"

[program:gpt-sovits-2]
command=/workspace/venvs/gpt-sovits/bin/python api_v2.py -a 127.0.0.1 -p 9882 -dr "/workspace/models/custom_voices/default/reference.wav" -dt "参考音频文本" -dl "zh"
